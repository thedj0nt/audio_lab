name: audio_lab_frontend
description: "A premium multi-stem audio player and upload client for Audio Lab."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^2.4.9

  # Networking
  http: ^1.2.0

  # File Picker
  file_picker: ^8.0.0

  # Audio Player for HTTP 206 streaming
  just_audio: ^0.9.38

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
